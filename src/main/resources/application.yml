spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mustache:
    cache: false
  data:
    redis:
      port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - org.springframework.ai.model.chat.memory.autoconfigure.ChatMemoryAutoConfiguration
      - org.springframework.ai.model.chat.observation.autoconfigure.ChatObservationAutoConfiguration
      - org.springframework.ai.model.embedding.observation.autoconfigure.EmbeddingObservationAutoConfiguration
      - org.springframework.ai.model.image.observation.autoconfigure.ImageObservationAutoConfiguration
      - org.springframework.ai.model.tool.autoconfigure.ToolCallingAutoConfiguration
      - org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration

ai:
  open-ai:
    model: gpt-4o-mini                  # Set OpenAI Model : Default is gpt-4o-mini
    api-key: ${AI_OPENAI_API_KEY:}      # Set your OpenAI API key for authentication
  anthropic:
    model: claude-3-5-sonnet-20241022   # Set Anthropic Model : Default is claude-3-5-sonnet-20241022
    api-key: ${AI_ANTHROPIC_API_KEY:}   # Set your Anthropic API key for authentication

loki:
  url: ${LOKI_URL:}                     # Set your Loki URL (e.g., http://localhost:3100) : Default is empty
github:
  url: ${GITHUB_URL:https://api.github.com} # Set your GitHub API URL (e.g., https://api.github.com)
  access-token: ${GITHUB_ACCESS_TOKEN:}     # Set your GitHub access token for authentication

analysis:
  data-retention-hours: 120 # Set the number of hours to retain analysis data : Default is 120 (5 days)
  maximum-view-count: 5     # Set the maximum number of views to retain per analysis (0 means unlimited) : Default is 5
  result-language: en       # Set the language for analysis results (e.g., en for English) : Default is en

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  paths-to-exclude: /
